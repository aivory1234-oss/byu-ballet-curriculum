        // ============================================================================
        // ⚛️ REACT COMPONENTS
        // ============================================================================

        const { useState, useMemo } = React;

        const ExerciseCard = ({ exercise }) => {
            const [isOpen, setIsOpen] = useState(false);

            return (
                <div className="bg-white rounded-lg shadow-sm border border-gray-200 mb-3 overflow-hidden">
                    <button 
                        onClick={() => setIsOpen(!isOpen)} 
                        className="w-full text-left px-5 py-4 flex justify-between items-center hover:bg-gray-50 focus:outline-none transition-colors"
                    >
                        <h4 className="font-serif text-lg text-byuNavy font-semibold">{exercise.name}</h4>
                        <span className="text-gray-400">
                            {isOpen ? (
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7"></path></svg>
                            ) : (
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                            )}
                        </span>
                    </button>
                    
                    {isOpen && (
                        <div className="px-5 pb-5 pt-2 border-t border-gray-100 text-gray-700 space-y-4">
                            <p className="text-sm leading-relaxed whitespace-pre-line"><span className="font-semibold text-gray-900">Description:</span> {exercise.description}</p>
                            <p className="text-sm"><span className="font-semibold text-gray-900">Tempo/Counts:</span> {exercise.counts}</p>
                            <p className="text-sm leading-relaxed"><span className="font-semibold text-gray-900">Technique Focus:</span> {exercise.focus}</p>
                            
                            <div className="mt-4 p-4 bg-gray-50 border border-dashed border-gray-300 rounded flex items-center justify-center">
                                {exercise.videoUrl ? (
                                    <a href={exercise.videoUrl} target="_blank" className="text-blue-600 hover:underline text-sm font-medium flex items-center gap-2">
                                        ▶ Watch Exercise Video
                                    </a>
                                ) : (
                                    <span className="text-gray-400 text-sm italic">Video placeholder (URL pending)</span>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CourseView = ({ course }) => {
            const [searchTerm, setSearchTerm] = useState('');

            const filteredExercises = course.exercises.filter(ex => 
                ex.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                ex.description.toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            const groupedExercises = filteredExercises.reduce((acc, ex) => {
                if (!acc[ex.category]) acc[ex.category] = [];
                acc[ex.category].push(ex);
                return acc;
            }, {});

            const categoryOrder = ["Barre", "Center", "Adagio", "Petit Allegro", "Allegro", "Grand Allegro", "Pointe"];
            const sortedCategories = Object.keys(groupedExercises).sort((a, b) => {
                let indexA = categoryOrder.indexOf(a);
                let indexB = categoryOrder.indexOf(b);
                if (indexA === -1) indexA = 99;
                if (indexB === -1) indexB = 99;
                return indexA - indexB;
            });

            return (
                <div className="max-w-4xl mx-auto py-8 px-4 sm:px-6 animate-fade-in">
                    
                    <header className="mb-10 text-center sm:text-left">
                        <div className="flex flex-col sm:flex-row sm:items-baseline sm:justify-between mb-2">
                            <h2 className="text-3xl font-serif font-bold text-byuNavy">{course.title}</h2>
                            <span className="mt-2 sm:mt-0 text-sm font-semibold tracking-wider uppercase text-byuNavyLight bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
                                {course.level}
                            </span>
                        </div>
                        <p className="text-gray-600 text-lg">{course.courseNumber}</p>
                        <p className="mt-4 text-gray-700">{course.description}</p>
                    </header>

                    {course.objectives && course.objectives.length > 0 && (
                        <section className="mb-10 bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                            <h3 className="text-xl font-serif font-semibold text-byuNavy mb-4 border-b border-gray-100 pb-2">Learning Objectives</h3>
                            <ul className="list-disc pl-5 space-y-2 text-gray-700">
                                {course.objectives.map((obj, i) => <li key={i} className="leading-relaxed">{obj}</li>)}
                            </ul>
                        </section>
                    )}

                    <div className="mb-8">
                        <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </div>
                            <input 
                                type="text" 
                                placeholder="Search sections..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-byuNavyLight focus:border-byuNavyLight sm:text-sm shadow-sm transition-colors"
                            />
                        </div>
                    </div>

                    <section>
                        {sortedCategories.length === 0 ? (
                            <p className="text-gray-500 italic text-center py-8">No content found matching "{searchTerm}".</p>
                        ) : (
                            sortedCategories.map(category => (
                                <div key={category} className="mb-8">
                                    <h4 className="text-lg font-semibold text-gray-500 uppercase tracking-wider mb-4 pl-2 border-l-4 border-byuNavyLight">
                                        {category}
                                    </h4>
                                    <div>
                                        {groupedExercises[category].map((exercise, index) => (
                                            <ExerciseCard key={index} exercise={exercise} />
                                        ))}
                                    </div>
                                </div>
                            ))
                        )}
                    </section>
                </div>
            );
        };

        const App = () => {
            const [activeTabId, setActiveTabId] = useState(CURRICULUM_DATA[0].id);
            const activeCourse = CURRICULUM_DATA.find(c => c.id === activeTabId);

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-byuNavy text-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex items-center justify-between h-16 border-b border-white/10">
                                <h1 className="font-serif text-xl font-bold tracking-wide">BYU Dance | Ballet</h1>
                            </div>
                            <div className="flex overflow-x-auto hide-scrollbar py-1">
                                <div className="flex space-x-1">
                                    {CURRICULUM_DATA.map((course) => (
                                        <button
                                            key={course.id}
                                            onClick={() => setActiveTabId(course.id)}
                                            className={`whitespace-nowrap px-4 py-3 text-sm font-medium transition-colors border-b-4 ${
                                                activeTabId === course.id
                                                    ? 'border-white text-white bg-white/10'
                                                    : 'border-transparent text-gray-300 hover:text-white hover:bg-white/5'
                                            }`}
                                        >
                                            {course.tabTitle}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow">
                        {activeCourse ? <CourseView course={activeCourse} /> : <p className="text-center mt-20">Course data not found.</p>}
                    </main>
                    
                    <footer className="bg-white border-t border-gray-200 mt-12 py-6 text-center text-sm text-gray-500">
                        <p>&copy; {new Date().getFullYear()} Brigham Young University Dance Department</p>
                        <p className="mt-1 text-xs">Curriculum Reference Tool</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</body>
</html>
